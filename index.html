<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Status | Mathematics Education Batch 4</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --apple-bg: #f5f5f7;
            --apple-text: #1d1d1f;
            --apple-blue: #0071e3;
            --glass-bg: rgba(255, 255, 255, 0.72);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'IBM Plex Sans Thai', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--apple-bg);
            color: var(--apple-text);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Navbar Style */
        nav {
            width: 100%;
            height: 48px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            top: 0;
            z-index: 1000;
            border-bottom: 0.5px solid rgba(0,0,0,0.1);
        }

        nav span {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: -0.01em;
            opacity: 0.8;
        }

        /* Hero Section */
        .hero {
            margin-top: 100px;
            text-align: center;
            padding: 0 20px;
            width: 100%;
            max-width: 800px;
        }

        .hero h1 {
            font-size: 48px;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
            background: linear-gradient(180deg, #1d1d1f 0%, #434344 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 21px;
            color: #86868b;
            margin-bottom: 40px;
        }

        /* Search Box */
        .search-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto 50px;
            position: relative;
        }

        .input-wrapper {
            position: relative;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            padding: 5px;
            display: flex;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .input-wrapper:focus-within {
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
            border: 1px solid var(--apple-blue);
        }

        input {
            flex: 1;
            border: none;
            padding: 15px 20px;
            font-size: 17px;
            outline: none;
            border-radius: 18px;
            background: transparent;
        }

        .btn-check {
            background-color: var(--apple-blue);
            color: #fff;
            border: none;
            padding: 10px 25px;
            border-radius: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-check:hover {
            background-color: #0077ed;
            transform: scale(1.02);
        }

        /* Result Card */
        #resultArea {
            width: 100%;
            max-width: 600px;
            padding: 0 20px 100px;
        }

        .order-card {
            background: #fff;
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.04);
            display: none;
            transform: translateY(30px);
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .order-card.show {
            display: block;
            transform: translateY(0);
            opacity: 1;
        }

        .card-header {
            border-bottom: 1px solid #f5f5f7;
            padding-bottom: 25px;
            margin-bottom: 25px;
        }

        .status-badge {
            display: inline-block;
            background: #e8f5e9;
            color: #2e7d32;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .detail-label {
            color: #86868b;
            font-size: 15px;
        }

        .detail-value {
            font-weight: 500;
            font-size: 17px;
            color: var(--apple-text);
        }

        .highlight-value {
            font-size: 24px;
            font-weight: 600;
            color: var(--apple-blue);
        }

        /* Loading & Error */
        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--apple-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #errorMsg {
            color: #ff3b30;
            display: none;
            margin-top: 20px;
            font-weight: 500;
        }

        footer {
            margin-top: auto;
            padding: 40px;
            color: #86868b;
            font-size: 12px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .hero h1 { font-size: 34px; }
            .hero p { font-size: 18px; }
            .order-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <nav>
        <span>Mathematics Teaching | Batch 4</span>
    </nav>

    <div class="hero">
        <h1>Pre-Order Status</h1>
        <p>ตรวจสอบรายละเอียดการจองเสื้อรุ่นของคุณ</p>
        
        <div class="search-container">
            <div class="input-wrapper">
                <input type="text" id="sid" placeholder="รหัสนักศึกษา 8 หลัก" autocomplete="off">
                <button class="btn-check" onclick="fetchOrder()">เช็คสถานะ</button>
            </div>
            <div id="loader" class="loader"></div>
            <div id="errorMsg">ไม่พบข้อมูลการจองในรอบที่ 1 นี้</div>
        </div>
    </div>

    <div id="resultArea">
        <div id="card" class="order-card">
            <div class="card-header">
                <div class="status-badge"><i class="fa-solid fa-circle-check"></i> ยืนยันการสั่งจองแล้ว</div>
                <h2 style="font-size: 28px; font-weight: 600;" id="displayName">-</h2>
                <p id="displaySid" style="color: #86868b; font-size: 16px;">ID: -</p>
            </div>

            <div class="detail-row">
                <span class="detail-label">ขนาดไซส์เสื้อ (Size)</span>
                <span class="detail-value highlight-value" id="displaySize">-</span>
            </div>

            <div class="detail-row">
                <span class="detail-label">ความยาวแขน (Sleeve)</span>
                <span class="detail-value" id="displaySleeve">-</span>
            </div>

            <div class="detail-row" style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #f5f5f7;">
                <span class="detail-label">รายการสั่งจองรอบที่</span>
                <span class="detail-value">1 (First Round)</span>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2024 Mathematics Education, Batch 4. All rights reserved.
    </footer>

    <script>
        // ใส่ข้อมูล Supabase ของคุณ
        const SB_URL = "https://pehcsvahuounbxgqxbrt.supabase.co";
        const SB_KEY = "sb_publishable_at6z6lMA5mhi7XpdGPjglQ_18mLDuPZ";
        const client = supabase.createClient(SB_URL, SB_KEY);

        async function fetchOrder() {
            const sidInput = document.getElementById('sid').value.trim();
            const card = document.getElementById('card');
            const loader = document.getElementById('loader');
            const errorMsg = document.getElementById('errorMsg');

            if (!sidInput) return;

            // Reset UI
            card.classList.remove('show');
            errorMsg.style.display = 'none';
            loader.style.display = 'block';

            try {
                const { data, error } = await client
                    .from('shirt_orders')
                    .select('*')
                    .eq('student_id', sidInput)
                    .single();

                loader.style.display = 'none';

                if (error || !data) {
                    errorMsg.style.display = 'block';
                } else {
                    // --- ฟังก์ชันตัดวงเล็บ () ออกให้สวยๆ ตามสั่ง ---
                    //Regex: ค้นหาข้อความที่มีวงเล็บและตัดออกทั้งหมด
                    let rawName = (data.title || "") + " " + (data.full_name || "");
                    let cleanName = rawName.replace(/\s*\(.*?\)\s*/g, ' ').trim();

                    // แสดงผลข้อมูล
                    document.getElementById('displayName').innerText = cleanName;
                    document.getElementById('displaySid').innerText = "รหัสนักศึกษา: " + data.student_id;
                    document.getElementById('displaySize').innerText = data.shirt_size;
                    document.getElementById('displaySleeve').innerText = data.sleeve_length;

                    // แสดง Card ด้วย Animation
                    card.style.display = 'block';
                    setTimeout(() => card.classList.add('show'), 100);
                }
            } catch (err) {
                loader.style.display = 'none';
                console.error(err);
            }
        }

        // กด Enter เพื่อเช็คได้เลย
        document.getElementById('sid').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchOrder();
        });
    </script>
</body>
</html>
